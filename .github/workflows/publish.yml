name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true
          cache: npm

      - name: Show package info
        run: |
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "package: $(node -p "require('./package.json').name")"
          echo "version: $(node -p "require('./package.json').version")"

      - name: Install dependencies
        run: npm ci

      - name: Build the CLI
        run: npm run build

      - name: Verify npm token identity and ownership (fail-fast)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          EXPECTED_OWNER="anghelodearroz"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"

          echo "Checking npm authentication..."
          ACTUAL_USER="$(npm whoami)"
          echo "Authenticated as: ${ACTUAL_USER}"

          if [ "${ACTUAL_USER}" != "${EXPECTED_OWNER}" ]; then
            echo "::error::NPM token user '${ACTUAL_USER}' is not expected owner '${EXPECTED_OWNER}'. Update secrets.NPM_TOKEN."
            exit 1
          fi

          echo "Checking package ownership for ${PACKAGE_NAME}..."
          npm owner ls "${PACKAGE_NAME}" | tee owners.txt

          if ! grep -qi "^${EXPECTED_OWNER}[[:space:]]*<" owners.txt; then
            echo "::error::User '${EXPECTED_OWNER}' is not listed as an owner of '${PACKAGE_NAME}'."
            exit 1
          fi

          echo "Ownership check passed."

      - name: Ensure release tag matches package version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          PKG_TAG="v$(node -p "require('./package.json').version")"
          REL_TAG="${{ github.event.release.tag_name }}"
          echo "Expected tag: ${PKG_TAG}"
          echo "Release tag:  ${REL_TAG}"
          if [ "${PKG_TAG}" != "${REL_TAG}" ]; then
            echo "::error::Release tag (${REL_TAG}) must match package version tag (${PKG_TAG})."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public